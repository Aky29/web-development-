<!DOCTYPE html>
<html>
<head>
    <title>Technical Team Assignment</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <form class="info">
        <div class="form-header">
            <h2>Registration Form</h2>
            <p>Please fill out the assignment form details below.</p>
        </div>

        <div class="form-group">
            <label for="name">Full Name</label>
            <input type="text" id="name" placeholder="Reshma Rani" required>
        </div>

        <div class="form-group">
            <label for="dob">Date of Birth</label>
            <input type="date" id="dob" required>
        </div>

        <div class="form-group">
            <label for="age">Age: <span id="agevalue">18</span> Years</label>
            <input type="range" id="age" value="18" max="100" min="12">
        </div>

        <div class="form-group">
            <label for="branch">Branch</label>
            <select id="branch" name="branch" required>
                <option value="">-- Select Branch --</option>
                <option value="CSE">CSE</option>
                <option value="CSIT">CSIT</option>
                <option value="ECE">ECE</option>
                <option value="EEE">EEE</option>
            </select>
        </div>

        <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" placeholder="vijaykumar@gmail.com" required>
        </div>

        <div class="form-group">
            <label for="tel">Telephone</label>
            <input type="tel" id="tel" placeholder="+1234567890">
        </div>

        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="Enter Password" required>
        </div>

        <fieldset class="full-width">
            <legend>Gender</legend>
            <div class="radio-wrapper">
                <label><input type="radio" name="gender" value="male"> Male</label>
                <label><input type="radio" name="gender" value="female"> Female</label>
                <label><input type="radio" name="gender" value="not mention"> Prefer not to say</label>
            </div>
        </fieldset>

        <div class="form-group full-width">
            <label for="queries">Queries</label>
            <textarea id="queries" rows="3" placeholder="you have doubts? write it here"></textarea>
        </div>

        <div class="form-group full-width">
            <label for="feedback">Feedback</label>
            <textarea id="feedback" rows="3" placeholder="what was your experience using this"></textarea>
        </div>

        <button type="submit" class="full-width">Submit Application</button>
    </form>
    <script src="script.js"></script>
</body>
</html>
